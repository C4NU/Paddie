name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            artifact_name: Paddie-macos-intel
            archive_format: zip
          - os: macos-14
            artifact_name: Paddie-macos-arm64
            archive_format: zip
          - os: windows-2025
            artifact_name: Paddie-windows-x64
            archive_format: zip
          - os: ubuntu-24.04
            artifact_name: Paddie-linux-x64
            archive_format: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r src/requirements.txt

      - name: Compile sources
        run: python -m compileall -q src docs scripts

      - name: Build application
        run: python scripts/build_release.py

      - name: Package application
        run: python scripts/package_release.py --artifact-name "${{ matrix.artifact_name }}" --format "${{ matrix.archive_format }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/*
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          files=$(find release-artifacts -type f | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" $files --clobber
          else
            gh release create "$RELEASE_TAG" $files --draft --title "$RELEASE_TAG" --notes "Draft release generated by GitHub Actions."
          fi
